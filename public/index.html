<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Veolia Sabana</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ed1c24">
<link rel="icon" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
  :root{
    --bg:#eeebe4;
    --card:#ffffff;
    --ink:#27384a;
    --muted:#8b93a1;
    --border:#e7e3da;
    --pill-bg:#f4f2ee;
    --blue-badge-bg:#dbe9fb;
    --blue-badge-ink:#1c4e8a;
    --blue-accent:#2f6fed;
    --black:#15171b;
    --green-ok-bg:#e1f3e5;
    --green-ok-ink:#1f8a3d;
    --red-ink:#c23b3b;
    --veolia-red:#ed1c24;
    --veolia-red-bg:#fde2e2;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
  }
  #phone{
    max-width:460px;
    margin:0 auto;
    min-height:100vh;
    padding:22px 16px 60px;
  }
  .topline{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
    min-height:28px;
  }
  .back-link{
    color:var(--muted);
    font-size:0.9rem;
    cursor:pointer;
    user-select:none;
    background:none;border:none;
    padding:4px 0;
  }
  .back-link:hover{ color:var(--ink); }
  .card{
    background:var(--card);
    border-radius:20px;
    padding:26px 24px 28px;
    box-shadow:0 1px 3px rgba(20,20,20,0.05);
    margin-bottom:16px;
  }
  .veolia-brand{ display:flex; flex-direction:column; align-items:center; margin-bottom:18px; }
  .veolia-brand img{ height:30px; }
  .veolia-brand .bar{ width:36px; height:3px; background:var(--veolia-red); border-radius:999px; margin-top:10px; }
  h1.title{ font-size:1.35rem; font-weight:600; margin:0 0 4px; color:var(--ink); }
  p.subtitle{ color:var(--muted); margin:0 0 20px; font-size:0.92rem; }
  label{ display:block; font-size:0.82rem; color:var(--muted); margin:14px 0 6px; }
  input[type=text],input[type=email],input[type=password],input[type=number],input[type=date],input[type=tel],select,textarea{
    width:100%; padding:12px 14px; font-size:0.95rem; border:1px solid var(--border);
    border-radius:12px; background:#fff; color:var(--ink); font-family:inherit;
  }
  input:focus,select:focus{ outline:2px solid var(--blue-accent); outline-offset:1px; }
  input:disabled{ background:var(--pill-bg); color:var(--muted); }
  .pw-wrap{ position:relative; }
  .pw-wrap input{ padding-right:44px; }
  .pw-eye{
    position:absolute; right:6px; top:50%; transform:translateY(-50%); border:none; background:none;
    cursor:pointer; font-size:1.05rem; padding:6px 8px; line-height:1; color:var(--muted);
  }
  .btn-black{
    display:block; width:100%; padding:14px; margin-top:20px; border:none; border-radius:999px;
    background:var(--black); color:#fff; font-size:1rem; font-weight:500; cursor:pointer; text-align:center;
  }
  .btn-black:disabled{ opacity:0.45; cursor:default; }
  .btn-black:hover:not(:disabled){ background:#000; }
  .btn-outline{
    display:inline-block; padding:12px 18px; border-radius:999px; background:var(--pill-bg);
    border:1px solid var(--border); color:var(--ink); font-size:0.92rem; cursor:pointer; text-align:center;
  }
  .btn-outline:hover{ background:#eae7e0; }
  .btn-outline.full{ display:block; width:100%; }
  .btn-outline.small{ padding:8px 14px; font-size:0.82rem; }
  .btn-link{ background:none;border:none;color:var(--blue-accent);cursor:pointer;font-size:0.88rem;padding:0; }
  .foot-note{ text-align:center; color:var(--muted); font-size:0.8rem; margin-top:16px; }
  .error-box{ background:#fdecec; color:var(--red-ink); border-radius:10px; padding:10px 14px; font-size:0.85rem; margin-top:14px; }
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:#15171b; color:#fff; padding:10px 20px; border-radius:999px; font-size:0.85rem;
    box-shadow:0 4px 14px rgba(0,0,0,0.2); z-index:50;
  }

  /* selector hogares */
  .hogar-row{
    display:flex; align-items:center; gap:14px; padding:16px; border-radius:16px;
    border:2px solid transparent; background:#fff; margin-bottom:12px; cursor:pointer;
  }
  .hogar-row.activo{ border-color:#1c3a5c; }
  .hogar-icon{ font-size:1.6rem; width:48px; height:48px; border-radius:12px; background:#eef1f5; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .hogar-info{ flex:1; min-width:0; }
  .hogar-info .nombre{ font-size:1.05rem; font-weight:600; }
  .hogar-info .meta{ color:var(--muted); font-size:0.85rem; margin-top:2px; }
  .badge-activo{ background:var(--blue-badge-bg); color:var(--blue-badge-ink); font-size:0.78rem; font-weight:600; padding:6px 12px; border-radius:999px; white-space:nowrap; }
  .chevron{ color:var(--muted); font-size:1.1rem; }

  /* home */
  .home-header{ display:flex; align-items:flex-start; justify-content:space-between; }
  .home-header .label{ color:var(--muted); font-size:0.85rem; }
  .home-header .nombre{ font-size:1.2rem; font-weight:600; cursor:pointer; }
  .bell{ width:44px;height:44px;border-radius:50%; background:var(--blue-badge-bg); display:flex; align-items:center; justify-content:center; font-size:1.2rem; cursor:pointer; flex-shrink:0; border:none; }
  .total-box{ background:#f5f3ee; border-radius:16px; padding:18px 20px; margin-top:16px; }
  .total-box .lbl{ color:var(--muted); font-size:0.88rem; }
  .total-box .val{ font-size:2rem; font-weight:600; margin-top:4px; }
  .total-box .warn{ color:#a9711a; font-size:0.85rem; margin-top:10px; }
  .venc-title{ font-weight:600; margin:22px 0 8px; }
  .venc-row{ display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
  .venc-row:last-of-type{ border-bottom:none; }
  .icon-circle{ width:42px;height:42px;border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.15rem; flex-shrink:0; }
  .venc-info{ flex:1; min-width:0; }
  .venc-info .nom{ font-weight:600; font-size:0.95rem; }
  .venc-info .sub{ color:var(--muted); font-size:0.8rem; margin-top:2px; }
  .nav-grid{ display:flex; justify-content:space-between; margin-top:22px; }
  .nav-item{ display:flex; flex-direction:column; align-items:center; gap:6px; background:none; border:none; cursor:pointer; color:var(--ink); flex:1; }
  .nav-item .ic{ width:52px;height:52px;border-radius:14px; background:var(--pill-bg); display:flex; align-items:center; justify-content:center; font-size:1.3rem; }
  .nav-item span{ font-size:0.78rem; color:var(--muted); }

  /* historial */
  .tabs{ display:flex; gap:18px; border-bottom:1px solid var(--border); margin-bottom:18px; overflow-x:auto; }
  .tab{ background:none; border:none; padding:8px 2px 12px; color:var(--muted); font-size:0.95rem; cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; }
  .tab.active{ color:var(--blue-accent); border-bottom-color:var(--blue-accent); font-weight:600; }
  .stat-row{ display:flex; gap:10px; margin-bottom:22px; }
  .stat-box{ flex:1; background:#f5f3ee; border-radius:14px; padding:12px 14px; }
  .stat-box .lbl{ color:var(--muted); font-size:0.76rem; }
  .stat-box .val{ font-size:1.15rem; font-weight:600; margin-top:2px; }
  .chart-wrap{ margin-bottom:22px; }
  .legend{ display:flex; gap:14px; flex-wrap:wrap; font-size:0.78rem; color:var(--ink); margin-bottom:14px; }
  .legend .dot{ display:inline-block; width:9px;height:9px;border-radius:50%; margin-right:5px; }
  .chart-area{ display:flex; align-items:flex-end; gap:10px; height:200px; border-bottom:1px solid var(--border); padding-bottom:2px; }
  .bar-col{ flex:1; position:relative; height:100%; }
  .bar-fill{ position:absolute; bottom:0; left:0; right:0; border-radius:6px 6px 0 0; }
  .bar-value{ position:absolute; bottom:calc(100% + 4px); left:-4px; right:-4px; text-align:center; font-size:0.66rem; color:var(--ink); white-space:nowrap; }
  .bar-labels{ display:flex; gap:10px; margin-top:6px; }
  .bar-labels span{ flex:1; text-align:center; font-size:0.75rem; color:var(--muted); }
  .hist-tabla{ margin-top:16px; border-top:1px solid var(--border); padding-top:6px; }
  .hist-tabla-fila{ display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:0.85rem; }
  .hist-tabla-fila:last-child{ border-bottom:none; }
  .hist-tabla-fila span:last-child{ font-weight:600; }
  .hist-title{ font-weight:600; margin:6px 0 6px; }
  .hist-row{ display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
  .hist-row:last-child{ border-bottom:none; }
  .hist-info{ flex:1; }
  .hist-info .nom{ font-weight:500; font-size:0.92rem; }
  .hist-info .fecha{ color:var(--muted); font-size:0.78rem; margin-top:2px; }
  .hist-monto{ font-weight:600; }

  /* metodos pago / miembros */
  .list-card{ background:#fff; border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:12px; display:flex; align-items:center; gap:14px; }
  .avatar{ width:44px;height:44px;border-radius:50%; background:var(--blue-badge-bg); color:var(--blue-badge-ink); display:flex; align-items:center; justify-content:center; font-weight:600; font-size:0.85rem; flex-shrink:0; }
  .rol-tag{ color:var(--muted); font-size:0.85rem; white-space:nowrap; }
  .dots-btn{ background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:4px 8px; }
  .popover{ position:relative; }
  .popover-menu{ position:absolute; right:0; top:32px; background:#fff; border:1px solid var(--border); border-radius:10px; box-shadow:0 4px 14px rgba(0,0,0,0.1); z-index:5; min-width:190px; overflow:hidden; }
  .popover-menu button{ display:block; width:100%; text-align:left; padding:10px 14px; background:none; border:none; font-size:0.85rem; cursor:pointer; color:var(--ink); }
  .popover-menu button:hover{ background:#f5f3ee; }
  .popover-menu button.danger{ color:var(--red-ink); }

  /* confirmar pago / comprobante */
  .resumen-box{ background:#f5f3ee; border-radius:14px; padding:16px 18px; margin-bottom:6px; }
  .resumen-top{ display:flex; align-items:center; gap:14px; padding-bottom:12px; border-bottom:1px solid var(--border); margin-bottom:12px; }
  .resumen-top .nom{ font-weight:600; }
  .resumen-top .sub{ color:var(--muted); font-size:0.82rem; margin-top:2px; }
  .kv-row{ display:flex; justify-content:space-between; font-size:0.9rem; }
  .monto-grande{ font-size:2.2rem; font-weight:600; margin:4px 0 18px; }
  .metodo-radio{ display:flex; align-items:center; gap:12px; padding:14px; border:1px solid var(--border); border-radius:12px; margin-bottom:10px; cursor:pointer; }
  .metodo-radio.selected{ border-color:var(--blue-accent); background:#f5f8ff; }
  .metodo-radio input{ width:auto; }
  .empresa-card{ display:flex; align-items:center; gap:12px; padding:14px; border:1px solid var(--border); border-radius:12px; margin-bottom:10px; cursor:pointer; }
  .empresa-card.selected{ border-color:var(--blue-accent); background:#f5f8ff; }
  .empresa-logo{ width:26px; height:26px; object-fit:contain; border-radius:5px; background:#fff; flex-shrink:0; }

  .receipt-check{ width:74px;height:74px;border-radius:50%; background:var(--green-ok-bg); color:var(--green-ok-ink); font-size:2rem; display:flex; align-items:center; justify-content:center; margin:8px auto 18px; }
  .receipt-title{ text-align:center; font-size:1.15rem; font-weight:600; }
  .receipt-sub{ text-align:center; color:var(--muted); margin-top:4px; }
  .receipt-monto{ text-align:center; font-size:2.1rem; font-weight:600; margin:16px 0; }
  .receipt-kv{ display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-size:0.9rem; }
  .receipt-kv:last-child{ border-bottom:none; }
  .receipt-box{ background:#f5f3ee; border-radius:14px; padding:6px 16px; margin-bottom:18px; }
  .two-col{ display:flex; gap:10px; }
  .two-col .btn-outline{ flex:1; }

  .pdf-modal-backdrop{ position:fixed; inset:0; background:rgba(20,20,20,0.65); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; }
  .pdf-modal{ background:#fff; border-radius:14px; width:100%; max-width:600px; height:88vh; display:flex; flex-direction:column; overflow:hidden; }
  .pdf-modal-header{ display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .pdf-modal-header span{ font-weight:600; }
  .pdf-modal-header button{ background:none; border:none; font-size:1.2rem; cursor:pointer; color:var(--muted); padding:4px 8px; }
  .pdf-modal iframe{ flex:1; border:none; width:100%; }

  /* toggles */
  .toggle-row{ display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--border); gap:12px; }
  .toggle-row:last-child{ border-bottom:none; }
  .toggle-row .lbl{ display:flex; align-items:center; gap:10px; font-size:0.95rem; }
  .switch{ position:relative; width:44px; height:26px; flex-shrink:0; }
  .switch input{ opacity:0; width:0; height:0; }
  .slider{ position:absolute; cursor:pointer; inset:0; background:#d7d3ca; border-radius:999px; transition:0.15s; }
  .slider:before{ content:""; position:absolute; height:20px; width:20px; left:3px; top:3px; background:#fff; border-radius:50%; transition:0.15s; }
  .switch input:checked + .slider{ background:var(--blue-accent); }
  .switch input:checked + .slider:before{ transform:translateX(18px); }
  .chip-row{ display:flex; gap:10px; margin-bottom:22px; flex-wrap:wrap; }
  .chip{ padding:10px 16px; border-radius:999px; border:1px solid var(--border); background:var(--pill-bg); font-size:0.88rem; cursor:pointer; }
  .chip.active{ background:var(--blue-badge-bg); color:var(--blue-badge-ink); border-color:transparent; font-weight:600; }

  /* perfil */
  .profile-head{ display:flex; align-items:center; gap:16px; margin-bottom:22px; }
  .profile-head .avatar{ width:60px;height:60px;font-size:1.1rem; }
  .profile-head .nombre{ font-size:1.1rem; font-weight:600; }
  .profile-head .correo{ color:var(--muted); font-size:0.85rem; }
  .plain-row{ display:flex; align-items:center; justify-content:space-between; padding:15px 0; border-bottom:1px solid var(--border); cursor:pointer; }
  .plain-row:last-of-type{ border-bottom:none; }
  .plain-row .lbl{ display:flex; align-items:center; gap:12px; font-size:0.95rem; }
  .plain-row.disabled{ color:var(--muted); cursor:default; }
  .id-box{ display:flex; align-items:center; gap:8px; background:#f5f3ee; border-radius:10px; padding:8px 12px; font-size:0.78rem; color:var(--muted); margin-top:2px; }

  .checkbox-row{ display:flex; align-items:center; justify-content:space-between; background:var(--pill-bg); border-radius:12px; padding:14px; margin-top:18px; }
  .checkbox-row input{ width:18px; height:18px; }
  #dev-codes{ background:#fff7dc; border:1px dashed #d8bd5a; border-radius:12px; padding:10px 14px; font-size:0.78rem; color:#6b551a; margin-top:14px; }
  .app-credit{ position:fixed; left:0; right:0; bottom:8px; text-align:center; font-size:0.7rem; color:var(--muted); pointer-events:none; z-index:50; }
</style>
</head>
<body>
<div id="phone"></div>
<div class="app-credit">Created by Aníbal Mercado</div>

<script>
const API = '';
const VEOLIA_LOGO = 'https://www.sabana.veolia.co/themes/custom/veo_site/build/assets/images/logo.png';
const veoliaBrandHtml = `<div class="veolia-brand"><img src="${VEOLIA_LOGO}" alt="Veolia Sabana" onerror="this.style.display='none'"><div class="bar"></div></div>`;
const TIPOS = ['LUZ','AGUA','GAS','INTERNET','CELULAR'];
const TIPO_LABEL = { LUZ:'Luz', AGUA:'Agua', GAS:'Gas', INTERNET:'Internet hogar', CELULAR:'Celular' };
const TIPO_ICON = { LUZ:{e:'💡',bg:'#dbeafe'}, AGUA:{e:'💧',bg:'#fde2e2'}, GAS:{e:'🔥',bg:'#fde2df'}, INTERNET:{e:'📶',bg:'#ffedd5'}, CELULAR:{e:'📱',bg:'#fbe4ee'} };
const TIPO_CHART = { LUZ:'#3b6fd8', AGUA:'#ed1c24', GAS:'#e2622c', INTERNET:'#f0a92e', CELULAR:'#ec6fa1' };
const MESES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const ROL_LABEL = { DUENO:'Dueño', PUEDE_PAGAR:'Puede pagar', SOLO_VER:'Solo ver' };

const state = {
  screen: 'registro',
  history: [],
  token: localStorage.getItem('pg_token') || null,
  usuario: null,
  usuarioIdPendiente: null,
  passwordPendiente: null,
  hogares: [],
  hogarActivo: null,
  cuentasActivo: [],
  pendientes: [],
  reminderDias: localStorage.getItem('pg_reminder') || '3',
};

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str == null ? '' : String(str);
  return d.innerHTML;
}
function money(n){
  const f = new Intl.NumberFormat('es-CO', { style:'currency', currency:'COP', maximumFractionDigits:0 }).format(Number(n)||0);
  return f.replace(/^(\D+)\s+/, '$1');
}
function moneyCorto(n){
  return '$' + Math.round(Number(n) / 1000) + 'k';
}
function fmtFecha(d){
  const dt = new Date(d);
  return `${String(dt.getDate()).padStart(2,'0')} ${MESES[dt.getMonth()]} ${dt.getFullYear()}`;
}
function fmtFechaSolo(isoDateOnly){
  const [y, m, d] = isoDateOnly.split('-').map(Number);
  return `${String(d).padStart(2,'0')} ${MESES[m-1]} ${y}`;
}
function fmtFechaCorta(d){
  const dt = new Date(d);
  return `${String(dt.getDate()).padStart(2,'0')} ${MESES[dt.getMonth()]}`;
}
function fmtFechaHora(d){
  const dt = new Date(d);
  let h = dt.getHours();
  const ampm = h >= 12 ? 'pm' : 'am';
  h = h % 12; if (h === 0) h = 12;
  const min = String(dt.getMinutes()).padStart(2,'0');
  return `${fmtFecha(dt)}, ${h}:${min} ${ampm}`;
}
function pwField(id, placeholder){
  return `
  <div class="pw-wrap">
    <input type="password" id="${id}" placeholder="${placeholder||''}">
    <button type="button" class="pw-eye" onclick="toggleVerPassword('${id}', this)">👁</button>
  </div>`;
}
function toggleVerPassword(id, btn){
  const input = document.getElementById(id);
  const verlo = input.type === 'password';
  input.type = verlo ? 'text' : 'password';
  btn.textContent = verlo ? '🙈' : '👁';
}
function toast(msg){
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

async function api(path, opts = {}) {
  const headers = Object.assign({ 'Content-Type': 'application/json' }, opts.headers || {});
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  const res = await fetch(API + path, Object.assign({}, opts, { headers }));
  const text = await res.text();
  let body = null;
  try { body = text ? JSON.parse(text) : null; } catch { body = text; }
  if (!res.ok) {
    const err = new Error((body && body.error) || (body && body.mensaje) || `Error HTTP ${res.status}`);
    err.status = res.status;
    err.body = body;
    throw err;
  }
  return body;
}

function goto(screen, push = true){
  if (push) state.history.push(state.screen);
  state.screen = screen;
  render();
  window.scrollTo(0,0);
}
function back(){
  const prev = state.history.pop();
  state.screen = prev || 'registro';
  render();
}

function backLink(label = '‹ Atrás'){
  return state.history.length ? `<div class="topline"><button class="back-link" onclick="back()">${label}</button><div></div></div>` : `<div class="topline"></div>`;
}

/* ---------- AUTH ---------- */

const TIPOS_DOCUMENTO = [
  { code: 'CC', label: 'Cédula de ciudadanía' },
  { code: 'CE', label: 'Cédula de extranjería' },
  { code: 'NIT', label: 'NIT' },
  { code: 'PA', label: 'Pasaporte' },
  { code: 'TI', label: 'Tarjeta de identidad' },
];

function screenRegistro(err, p){
  p = p || {};
  return `
  ${backLink('')}
  <div class="card">
    ${veoliaBrandHtml}
    <h1 class="title">Crea tu cuenta</h1>
    <p class="subtitle">Vas a necesitar confirmar tu correo y tu celular</p>
    <label>Nombre completo</label>
    <input type="text" id="f-nombre" placeholder="Juan Pérez" value="${escapeHtml(p.nombre || '')}">
    <label>Tipo de documento</label>
    <select id="f-tipo-doc">
      ${TIPOS_DOCUMENTO.map(t => `<option value="${t.code}" ${p.tipoDocumento===t.code?'selected':''}>${t.label}</option>`).join('')}
    </select>
    <label>Número de documento</label>

// Al iniciar sesión (o al restaurar la sesión guardada), refrescamos en
// segundo plano el valor real de cada suscripción de Veolia consultando su
// portal, sin bloquear la pantalla. Así cuando el usuario entre a un hogar
// ya encuentra el dato cacheado y fresco (ver abrirHogar).
// Solo se hace una vez por día calendario (aunque recargue varias veces la
// página), para no golpear el portal de Veolia más de lo necesario.
function fechaHoyStr(){ return new Date().toISOString().slice(0,10); }

function refrescarFacturasVeoliaEnSegundoPlano(hogares){
  const hoy = fechaHoyStr();
  if (localStorage.getItem('pg_ultimo_refresco_veolia') === hoy) return;
  localStorage.setItem('pg_ultimo_refresco_veolia', hoy);
  hogares
    .flatMap(h => (h.cuentas || []).filter(c => c.tipo === 'AGUA' && c.empresa === 'Veolia Sabana'))
    .forEach(c => { api(`/api/cuentas/${c.id}/factura-veolia`).catch(() => {}); });
}

// Cubre el caso de dejar la pestaña abierta de un día para otro sin recargar:
// revisa periódicamente (y al volver a la pestaña) si ya cambió el día y, de
// ser así, vuelve a traer hogares/cuentas para refrescar Veolia.
async function refrescarFacturasVeoliaSiNuevoDia(){
  if (!state.usuario) return;
  if (localStorage.getItem('pg_ultimo_refresco_veolia') === fechaHoyStr()) return;
  try {
    const hogares = await api('/api/hogares');
    const conCuentas = await Promise.all(hogares.map(async h => {
      let cuentas = [];
      try { cuentas = await api(`/api/cuentas/hogares/${h.id}`); } catch {}
      return Object.assign({}, h, { cuentas });
    }));
    refrescarFacturasVeoliaEnSegundoPlano(conCuentas);
  } catch {}
}
setInterval(refrescarFacturasVeoliaSiNuevoDia, 15 * 60 * 1000);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') refrescarFacturasVeoliaSiNuevoDia();
});

async function abrirHogar(id){
  const hogar = await api(`/api/hogares/${id}`);
  state.hogarActivo = hogar;
  const cuentas = await api(`/api/cuentas/hogares/${id}`);
  state.cuentasActivo = cuentas;

  // El valor de cada suscripción ya viene cacheado (facturaVeolia) desde la
  // última consulta real a Veolia — no hace falta volver a consultar el
  // portal en vivo solo para abrir el hogar. Esa consulta en vivo se hace al
  // entrar al detalle de la factura (verFacturaVeoliaDesdeHome).
  cuentas.forEach(c => {
    if (c.tipo === 'AGUA' && c.empresa === 'Veolia Sabana' && c.facturaVeolia) {
      c.montoPendiente = c.facturaVeolia.totalPagar;
    }
  });

  state.pendientes = cuentas;
  goto('home', false);
  state.history = [];
}

async function eliminarServicioHogar(cuentaId){
  const cuenta = state.cuentasActivo.find(c => c.id === cuentaId);
  const nombre = cuenta ? cuenta.empresa : 'este servicio';
  if (!confirm(`¿Eliminar ${nombre}? Esta acción no se puede deshacer.`)) return;

function pdfFacturaVeoliaBlobUrl(){
  const base64 = state.facturaVeolia.factura.pdfBase64;
  const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
  const blob = new Blob([bytes], { type: 'application/pdf' });
  return URL.createObjectURL(blob);
}
function descargarBlob(url, filename){
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
}
function verPdfFacturaVeolia(){
  // Un blob: URL abierto en una pestaña nueva suele quedar en blanco en Chrome
  // (el blob vive en el proceso de la pestaña original), así que se muestra
  // aquí mismo en un visor dentro de la app.
  const url = pdfFacturaVeoliaBlobUrl();
  mostrarPdfModal(url);
}
function mostrarPdfModal(url){
  cerrarPdfModal();
  const backdrop = document.createElement('div');
  backdrop.className = 'pdf-modal-backdrop';
  backdrop.id = 'pdf-modal-backdrop';
  backdrop.innerHTML = `
    <div class="pdf-modal">
      <div class="pdf-modal-header">
        <span>Factura PDF</span>
        <button onclick="cerrarPdfModal()">✕</button>
      </div>
      <iframe src="${url}"></iframe>
    </div>`;
  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) cerrarPdfModal(); });
  document.body.appendChild(backdrop);
  window._pdfModalUrl = url;
}
function cerrarPdfModal(){
  const el = document.getElementById('pdf-modal-backdrop');
  if (el) el.remove();
  if (window._pdfModalUrl) { URL.revokeObjectURL(window._pdfModalUrl); window._pdfModalUrl = null; }
}
function descargarPdfFacturaVeolia(){
  const url = pdfFacturaVeoliaBlobUrl();
  descargarBlob(url, `factura-veolia-${state.facturaVeolia.cuenta.numeroCuenta}.pdf`);
  URL.revokeObjectURL(url);
}
// La propia app de Similpay soporta pasar la referencia directamente en la
// URL (biller_code/:id/:referencia), y con eso ya hace la búsqueda sola y
// muestra el resultado en su sitio real. No hay que escribir ni dar clic en
// "buscar": abrimos esa pestaña ya con el resultado listo. De ahí en adelante
// seleccionar PSE, aceptar las políticas y presionar "Pagar" es una
// transacción real que debe completar la persona.
function pagarConSimilpay(){
  const { factura } = state.facturaVeolia;
  const ref = factura.referenciaPago;
  if (!ref) { toast('No hay referencia de pago para consultar'); return; }
  const url = `https://similpay.com/#/biller_code/18569/${encodeURIComponent(ref)}`;
  window.open(url, '_blank', 'noopener');
}

/* ---------- HISTORIAL ---------- */

function screenHistorial(){
  const cuentas = state.cuentasActivo;
  if (!cuentas.length) {
    return `${backLink()}<div class="card"><h1 class="title">Historial</h1><p class="subtitle">Aún no tienes suscripciones de agua registradas.</p></div>`;
  }
  const cuentaId = (state.historialSuscripcionId && cuentas.some(c => c.id === state.historialSuscripcionId))
    ? state.historialSuscripcionId
    : cuentas[0].id;
  const cuenta = cuentas.find(c => c.id === cuentaId);

  // El histórico de facturación viene directo del recibo de Veolia (últimos
  // periodos ya facturados); no guardamos pagos dentro de la app.
  const historico = (cuenta.facturaVeolia && cuenta.facturaVeolia.historico) || [];
  const maxTotal = Math.max(1, ...historico.map(h => h.valor));
  const totalEsteMes = historico.length ? historico[historico.length - 1].valor : 0;
  const promedio = historico.length ? historico.reduce((a,h) => a + h.valor, 0) / historico.length : 0;

  const bars = historico.map(h => `
    <div class="bar-col">
      <div class="bar-fill" style="height:${(h.valor/maxTotal)*85}%;background:${TIPO_CHART.AGUA};">
        <span class="bar-value">${moneyCorto(h.valor)}</span>
      </div>
    </div>`).join('');
  const labels = historico.map(h => `<span>${MESES[Number(h.mes.slice(5,7))-1]}</span>`).join('');
  const tablaFilas = historico.map(h => `
    <div class="hist-tabla-fila">
      <span>${MESES[Number(h.mes.slice(5,7))-1]} ${h.mes.slice(0,4)}</span>
      <span>${money(h.valor)}</span>
    </div>`).join('');

  const tabsHtml = cuentas.length > 1 ? `
    <div class="tabs">
      ${cuentas.map(c => `<button class="tab ${c.id===cuentaId?'active':''}" onclick="verHistorialSuscripcion('${c.id}')">${escapeHtml(c.alias || 'Suscriptor ' + c.numeroCuenta)}</button>`).join('')}
    </div>` : '';

  return `
  ${backLink()}
  <div class="card">
    <h1 class="title" style="margin-bottom:14px;">Historial</h1>
    ${tabsHtml}
    <div class="stat-row">
      <div class="stat-box"><div class="lbl">Última factura</div><div class="val">${money(totalEsteMes)}</div></div>
      <div class="stat-box"><div class="lbl">Promedio mensual</div><div class="val">${money(promedio)}</div></div>
    </div>
    ${historico.length ? `
    <div class="chart-wrap">
      <div class="hist-title" style="margin-top:0;">Valor facturado por mes (según Veolia)</div>
      <div class="chart-area">${bars}</div>
      <div class="bar-labels">${labels}</div>
      <div class="hist-tabla">${tablaFilas}</div>
    </div>` : '<p class="subtitle">Aún no hay histórico de facturación para esta suscripción. Ábrela una vez para consultarlo.</p>'}
  </div>`;
}

async function abrirHistorial(){
  if (!state.historialSuscripcionId || !state.cuentasActivo.some(c => c.id === state.historialSuscripcionId)) {
    state.historialSuscripcionId = state.cuentasActivo[0] ? state.cuentasActivo[0].id : null;
  }
  goto('historial');
}
function verHistorialSuscripcion(cuentaId){

}

/* ---------- RENDER DISPATCH ---------- */

function render(html){
  const app = document.getElementById('phone');
  if (typeof html === 'string') { app.innerHTML = html; return; }
  switch(state.screen){
    case 'registro': app.innerHTML = screenRegistro(); break;
    case 'login': app.innerHTML = screenLogin(); break;
    case 'olvidePassword': app.innerHTML = screenOlvidePassword(); break;
    case 'restablecerPassword': app.innerHTML = screenRestablecerPassword(); break;
    case 'confirmarCorreo': app.innerHTML = screenConfirmarCorreo(); break;
    case 'confirmarCelular': app.innerHTML = screenConfirmarCelular(); break;
    case 'selectorHogares': app.innerHTML = screenSelectorHogares(); break;
    case 'crearHogar': app.innerHTML = screenCrearHogar(); break;
    case 'home': app.innerHTML = screenHome(); break;
    case 'agregarServicio': app.innerHTML = screenAgregarServicio(); break;
    case 'facturaVeolia': app.innerHTML = screenFacturaVeolia(); break;
    case 'historial': app.innerHTML = screenHistorial(); break;
    case 'miembros': app.innerHTML = screenMiembros(); break;
    case 'invitarMiembro': app.innerHTML = screenInvitarMiembro(); break;
    case 'notificaciones': app.innerHTML = screenNotificaciones(); break;
    case 'oficinas': app.innerHTML = screenOficinas(); break;
    case 'perfil': app.innerHTML = screenPerfil(); break;
    case 'datosPersonales': app.innerHTML = screenDatosPersonales(); break;
    case 'seguridad': app.innerHTML = screenSeguridad(); break;
    default: app.innerHTML = screenRegistro();
  }
}

/* ---------- BOOT ---------- */

(async function boot(){
  if (state.token) {
    try {
      state.usuario = await api('/api/auth/me');
      await abrirSelectorHogares();
      return;
    } catch {
      state.token = null;
      localStorage.removeItem('pg_token');
    }
  }
  render();
})();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
}
